name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Install Node.js dependencies
      run: |
        if [ -f package.json ]; then npm install; fi

    - name: Run Python linting/tests
      run: |
        if [ -f requirements.txt ]; then
          if pip show pytest > /dev/null 2>&1; then pytest; fi
          if pip show flake8 > /dev/null 2>&1; then flake8 .; fi
        fi

    - name: Run Node.js linting/tests
      run: |
        if [ -f package.json ]; then
          if npm run | grep -q lint; then npm run lint; fi
          if npm test | grep -q test; then npm test; fi
        fi